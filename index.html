<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шпаргалка — Билеты</title>
<style>
  :root{
    --bg:#1c1d21;
    --panel:#26282e;
    --accent:#ffcc4d;
    --text:#eceef1;
    --text-dim:#9a9da5;
    --btn:#33353c;
    --btn-active:#ffcc4d;
    --btn-active-text:#1c1d21;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  .screen{display:none; min-height:100vh; min-height:100dvh;}
  .screen.active{display:flex; flex-direction:column;}
  #homeScreen.active{
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .home-header{
    flex-shrink:0;
    padding:clamp(10px,2.5vw,18px) clamp(16px,4vw,32px) clamp(6px,1.5vw,10px);
    padding-top:max(clamp(10px,2.5vw,18px), env(safe-area-inset-top));
    text-align:center;
  }
  .home-header h1{
    margin:0;
    font-size:clamp(17px,4vw,22px);
    font-weight:600;
  }
  .home-header p{
    margin:4px 0 0;
    font-size:clamp(12px,2.8vw,14px);
    color:var(--text-dim);
  }
  .home-main{
    flex:1;
    min-height:0;
    display:flex;
    width:100%;
    padding:0 clamp(10px,3vw,28px) max(clamp(10px,3vw,28px), env(safe-area-inset-bottom));
  }
  .grid{
    flex:1;
    width:100%;
    min-height:0;
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    grid-auto-rows:1fr;
    gap:clamp(8px,2vmin,18px);
    align-content:stretch;
  }
  @media (min-width:520px){
    .grid{grid-template-columns:repeat(5, minmax(0, 1fr));}
  }
  @media (min-width:768px){
    .grid{grid-template-columns:repeat(6, minmax(0, 1fr));}
  }
  @media (min-width:1100px){
    .home-main{
      max-width:1400px;
      margin:0 auto;
    }
    .grid{grid-template-columns:repeat(10, minmax(0, 1fr));}
  }
  .ticket-btn{
    background:var(--btn);
    color:var(--text);
    border:none;
    border-radius:clamp(10px,2.5vmin,16px);
    width:100%;
    height:100%;
    min-height:clamp(52px,12vmin,110px);
    padding:0;
    font-size:clamp(18px,4.8vmin,28px);
    font-weight:700;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 0 rgba(0,0,0,.22);
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
    transition:background .15s ease, color .15s ease, transform .1s ease, filter .15s ease;
  }
  @media (hover:hover){
    .ticket-btn:hover{filter:brightness(1.1);}
  }
  .ticket-btn:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  .ticket-btn:active{transform:scale(0.96);}
  .ticket-btn.active{
    background:var(--btn-active);
    color:var(--btn-active-text);
    box-shadow:0 2px 0 rgba(0,0,0,.15);
  }
  .viewer-topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px 6px;
    position:sticky;
    top:0;
    z-index:10;
    background:var(--bg);
  }
  .back-btn{
    background:var(--panel);
    color:var(--text);
    border:none;
    border-radius:8px;
    padding:8px 12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .back-btn:active{opacity:.8;}
  .page-info{
    flex:1;
    font-size:13px;
    color:var(--text-dim);
    text-align:center;
    min-width:0;
  }
  .viewer-wrap{
    flex:1;
    overflow:auto;
    display:flex;
    justify-content:center;
    padding:6px 0 24px;
  }
  .page-shell{
    position:relative;
    background:#fff;
    box-shadow:0 4px 24px rgba(0,0,0,.4);
    margin:0 auto;
    line-height:0;
  }
  .page-shell canvas{display:block;}
  .textLayer{
    position:absolute;
    top:0; left:0;
    overflow:hidden;
    line-height:1;
  }
  .textLayer span{
    color:transparent;
    position:absolute;
    white-space:pre;
    cursor:text;
    transform-origin:0% 0%;
  }
  .loading{
    color:var(--text-dim);
    text-align:center;
    padding:40px 16px;
    font-size:14px;
  }
  #homeLoading{
    position:absolute;
    left:0;
    right:0;
    bottom:max(20px, env(safe-area-inset-bottom));
    padding:0 16px;
  }
  #homeScreen{position:relative;}
</style>
</head>
<body>

<div class="screen active" id="homeScreen">
  <header class="home-header">
    <h1>Шпаргалка — Билеты</h1>
    <p>Нажми на номер билета — откроется нужная страница</p>
  </header>
  <div class="home-main">
    <div class="grid" id="grid"></div>
  </div>
  <div class="loading" id="homeLoading">Загрузка PDF…</div>
</div>

<div class="screen" id="viewerScreen">
  <div class="viewer-topbar">
    <button class="back-btn" id="backBtn" type="button">← Назад</button>
    <span class="page-info" id="pageInfo">—</span>
  </div>
  <div class="viewer-wrap" id="viewerWrap">
    <div class="loading" id="viewerLoading">Открываем страницу…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const TICKET_PAGES = [1,4,7,10,14,19,24,27,31,33,39,43,45,48,50,54,59,62,65,70,75,80,85,91,95,99,104,107,111,116];
const PDF_URL = "tickets.pdf";
const HIGHLIGHT_MS = 3000;
const HIGHLIGHT_FADE_MS = 800;

let pdfDoc = null;
let pdfReady = false;
let currentPage = 1;
let currentTicket = null;
let renderToken = 0;
let highlightTimer = null;

const homeScreen = document.getElementById("homeScreen");
const viewerScreen = document.getElementById("viewerScreen");
const grid = document.getElementById("grid");
const viewerWrap = document.getElementById("viewerWrap");
const pageInfo = document.getElementById("pageInfo");
const backBtn = document.getElementById("backBtn");
const homeLoading = document.getElementById("homeLoading");
const viewerLoading = document.getElementById("viewerLoading");
let swipeStartX = 0;
let swipeStartY = 0;

TICKET_PAGES.forEach((page, idx) => {
  const num = idx + 1;
  const btn = document.createElement("button");
  btn.className = "ticket-btn";
  btn.textContent = num;
  btn.dataset.num = num;
  btn.addEventListener("click", () => goToTicket(num));
  grid.appendChild(btn);
});

function showScreen(name){
  homeScreen.classList.toggle("active", name === "home");
  viewerScreen.classList.toggle("active", name === "viewer");
}

function setActiveButton(num){
  document.querySelectorAll(".ticket-btn").forEach(b => {
    b.classList.toggle("active", num != null && Number(b.dataset.num) === num);
  });
}

async function init(){
  try{
    pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
    pdfReady = true;
    homeLoading.remove();
  }catch(err){
    homeLoading.textContent = "Не удалось загрузить PDF: " + err.message;
  }
}

function goToTicket(num){
  if(!pdfReady){
    homeLoading.textContent = "PDF ещё загружается, подождите…";
    return;
  }
  const page = TICKET_PAGES[num - 1];
  currentTicket = num;
  setActiveButton(num);
  showScreen("viewer");
  renderPage(page, num);
}

function goHome(){
  if(highlightTimer){
    clearTimeout(highlightTimer);
    highlightTimer = null;
  }
  currentTicket = null;
  setActiveButton(null);
  showScreen("home");
}

function goToTicketHeading(ticketNum, textLayerDiv, shell){
  const spans = Array.from(textLayerDiv.querySelectorAll("span"));
  const pattern = new RegExp("БИЛЕТ\\s*№\\s*" + ticketNum + "\\b", "i");
  let targets = [];

  for(const span of spans){
    if(pattern.test((span.textContent || "").replace(/\s+/g, " "))){
      targets = [span];
      break;
    }
  }

  if(!targets.length){
    for(let i = 0; i < spans.length; i++){
      let combined = "";
      const group = [];
      for(let j = i; j < Math.min(i + 10, spans.length); j++){
        combined += spans[j].textContent || "";
        group.push(spans[j]);
        if(pattern.test(combined.replace(/\s+/g, " "))){
          targets = group;
          break;
        }
      }
      if(targets.length) break;
    }
  }

  if(!targets.length){
    for(const span of spans){
      const t = span.textContent || "";
      if(/БИЛЕТ/i.test(t) && /№/.test(t)){
        targets = [span];
        break;
      }
    }
  }

  if(!targets.length) return;

  targets.forEach(target => {
    target.style.transition = "none";
    target.style.backgroundColor = "rgba(255,204,77,0.9)";
    target.style.borderRadius = "3px";
    target.style.boxShadow = "0 0 0 3px rgba(255,204,77,0.75)";
  });

  requestAnimationFrame(() => {
    targets[0].scrollIntoView({ behavior: "smooth", block: "center" });
    highlightTimer = setTimeout(() => {
      targets.forEach(target => {
        target.style.transition = "background-color " + HIGHLIGHT_FADE_MS + "ms ease, box-shadow " + HIGHLIGHT_FADE_MS + "ms ease";
        target.style.backgroundColor = "transparent";
        target.style.boxShadow = "0 0 0 0 rgba(255,204,77,0)";
      });
      highlightTimer = null;
    }, HIGHLIGHT_MS);
  });
}

async function renderPage(pageNum, ticketNum){
  if(!pdfDoc) return;

  if(highlightTimer){
    clearTimeout(highlightTimer);
    highlightTimer = null;
  }

  pageNum = Math.min(Math.max(1, pageNum), pdfDoc.numPages);
  currentPage = pageNum;
  currentTicket = ticketNum ?? currentTicket;

  const myToken = ++renderToken;
  viewerWrap.innerHTML = "";
  const loading = document.createElement("div");
  loading.className = "loading";
  loading.textContent = "Открываем страницу…";
  viewerWrap.appendChild(loading);

  const page = await pdfDoc.getPage(pageNum);
  if(myToken !== renderToken) return;

  const containerWidth = Math.min(viewerWrap.clientWidth - 16, 760);
  const baseViewport = page.getViewport({ scale: 1 });
  const outputScale = window.devicePixelRatio || 1;
  const scale = containerWidth / baseViewport.width;
  const viewport = page.getViewport({ scale });

  viewerWrap.innerHTML = "";
  const shell = document.createElement("div");
  shell.className = "page-shell";
  shell.style.width = viewport.width + "px";
  shell.style.height = viewport.height + "px";

  const canvas = document.createElement("canvas");
  canvas.width = Math.floor(viewport.width * outputScale);
  canvas.height = Math.floor(viewport.height * outputScale);
  canvas.style.width = viewport.width + "px";
  canvas.style.height = viewport.height + "px";
  const ctx = canvas.getContext("2d");
  const transform = outputScale !== 1 ? [outputScale,0,0,outputScale,0,0] : null;

  shell.appendChild(canvas);
  viewerWrap.appendChild(shell);

  await page.render({ canvasContext: ctx, viewport, transform }).promise;
  if(myToken !== renderToken) return;

  const textLayerDiv = document.createElement("div");
  textLayerDiv.className = "textLayer";
  textLayerDiv.style.width = viewport.width + "px";
  textLayerDiv.style.height = viewport.height + "px";
  shell.appendChild(textLayerDiv);

  const textContent = await page.getTextContent();
  if(myToken !== renderToken) return;

  await pdfjsLib.renderTextLayer({
    textContentSource: textContent,
    container: textLayerDiv,
    viewport
  }).promise;
  if(myToken !== renderToken) return;

  updatePageInfo();

  if(ticketNum){
    goToTicketHeading(ticketNum, textLayerDiv, shell);
  }
}

function updatePageInfo(){
  let label = "Стр. " + currentPage + " из " + pdfDoc.numPages;
  if(currentTicket) label = "Билет " + currentTicket + " · " + label;
  pageInfo.textContent = label;
}

backBtn.addEventListener("click", goHome);

viewerWrap.addEventListener("touchstart", (e) => {
  swipeStartX = e.changedTouches[0].screenX;
  swipeStartY = e.changedTouches[0].screenY;
}, { passive: true });

viewerWrap.addEventListener("touchend", (e) => {
  if(!pdfDoc || !viewerScreen.classList.contains("active")) return;
  const dx = e.changedTouches[0].screenX - swipeStartX;
  const dy = e.changedTouches[0].screenY - swipeStartY;
  if(Math.abs(dx) < 50 || Math.abs(dx) < Math.abs(dy)) return;
  if(dx < 0 && currentPage < pdfDoc.numPages) renderPage(currentPage + 1, null);
  else if(dx > 0 && currentPage > 1) renderPage(currentPage - 1, null);
}, { passive: true });

window.addEventListener("keydown", (e) => {
  if(!pdfDoc || !viewerScreen.classList.contains("active")) return;
  if(e.key === "ArrowRight" && currentPage < pdfDoc.numPages) renderPage(currentPage + 1, null);
  else if(e.key === "ArrowLeft" && currentPage > 1) renderPage(currentPage - 1, null);
});

window.addEventListener("resize", () => {
  if(viewerScreen.classList.contains("active")){
    renderPage(currentPage, currentTicket);
  }
});

init();
</script>
</body>
</html>
