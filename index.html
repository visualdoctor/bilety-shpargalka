<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шпаргалка — Билеты</title>
<style>
  :root{
    --bg:#1c1d21;
    --panel:#26282e;
    --accent:#ffcc4d;
    --text:#eceef1;
    --text-dim:#9a9da5;
    --btn:#33353c;
    --btn-active:#ffcc4d;
    --btn-active-text:#1c1d21;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  .screen{display:none; min-height:100vh; min-height:100dvh;}
  .screen.active{display:flex; flex-direction:column;}
  #homeScreen.active{
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .home-header{
    flex-shrink:0;
    padding:clamp(10px,2.5vw,18px) clamp(16px,4vw,32px) clamp(6px,1.5vw,10px);
    padding-top:max(clamp(10px,2.5vw,18px), env(safe-area-inset-top));
    text-align:center;
  }
  .home-header h1{
    margin:0;
    font-size:clamp(17px,4vw,22px);
    font-weight:600;
  }
  .home-header p{
    margin:4px 0 0;
    font-size:clamp(12px,2.8vw,14px);
    color:var(--text-dim);
  }
  .home-main{
    flex:1;
    min-height:0;
    display:flex;
    width:100%;
    padding:0 clamp(10px,3vw,28px) max(clamp(10px,3vw,28px), env(safe-area-inset-bottom));
  }
  .grid{
    flex:1;
    width:100%;
    min-height:0;
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    grid-auto-rows:1fr;
    gap:clamp(8px,2vmin,18px);
    align-content:stretch;
  }
  @media (min-width:520px){
    .grid{grid-template-columns:repeat(5, minmax(0, 1fr));}
  }
  @media (min-width:768px){
    .grid{grid-template-columns:repeat(6, minmax(0, 1fr));}
  }
  @media (min-width:1100px){
    .home-main{
      max-width:1400px;
      margin:0 auto;
    }
    .grid{grid-template-columns:repeat(10, minmax(0, 1fr));}
  }
  .ticket-btn{
    background:var(--btn);
    color:var(--text);
    border:none;
    border-radius:clamp(10px,2.5vmin,16px);
    width:100%;
    height:100%;
    min-height:clamp(52px,12vmin,110px);
    padding:0;
    font-size:clamp(18px,4.8vmin,28px);
    font-weight:700;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 0 rgba(0,0,0,.22);
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
    transition:background .15s ease, color .15s ease, transform .1s ease, filter .15s ease;
  }
  @media (hover:hover){
    .ticket-btn:hover{filter:brightness(1.1);}
  }
  .ticket-btn:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  .ticket-btn:active{transform:scale(0.96);}
  .ticket-btn.active{
    background:var(--btn-active);
    color:var(--btn-active-text);
    box-shadow:0 2px 0 rgba(0,0,0,.15);
  }
  .viewer-topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px 6px;
    position:sticky;
    top:0;
    z-index:10;
    background:var(--bg);
  }
  .back-btn{
    background:var(--panel);
    color:var(--text);
    border:none;
    border-radius:8px;
    padding:8px 12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .back-btn:active{opacity:.8;}
  .page-info{
    flex:1;
    font-size:13px;
    color:var(--text-dim);
    text-align:center;
    min-width:0;
  }
  .viewer-wrap{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    overscroll-behavior-x:none;
    -webkit-overflow-scrolling:touch;
    scroll-snap-type:y proximity;
    padding:6px 0 24px;
  }
  .pages-strip{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:clamp(10px,2.5vw,18px);
    width:100%;
    max-width:100%;
    padding:0 clamp(8px,2vw,16px);
  }
  .page-shell{
    position:relative;
    background:#fff;
    box-shadow:0 4px 24px rgba(0,0,0,.4);
    flex-shrink:0;
    line-height:0;
    scroll-margin-top:8px;
    scroll-snap-align:start;
    content-visibility:auto;
    contain-intrinsic-size:auto 900px;
  }
  .page-shell canvas{display:block;}
  .textLayer{
    position:absolute;
    top:0; left:0;
    overflow:visible;
    line-height:1;
    pointer-events:none;
    user-select:none;
  }
  .textLayer span{
    color:transparent;
    position:absolute;
    white-space:pre;
    transform-origin:0% 0%;
  }
  @keyframes heading-highlight-fade{
    from{background-color:rgba(164,245,66,0.92);}
    to{background-color:transparent;}
  }
  .heading-highlight-flash{
    position:absolute;
    z-index:5;
    pointer-events:none;
    border-radius:4px;
    animation:heading-highlight-fade 3s ease-out forwards;
  }
  .loading{
    color:var(--text-dim);
    text-align:center;
    padding:40px 16px;
    font-size:14px;
  }
  #homeLoading{
    position:absolute;
    left:0;
    right:0;
    bottom:max(20px, env(safe-area-inset-bottom));
    padding:0 16px;
  }
  #homeScreen{position:relative;}
</style>
</head>
<body>

<div class="screen active" id="homeScreen">
  <header class="home-header">
    <h1>Шпаргалка — Билеты</h1>
    <p>Нажми на номер билета — откроется нужная страница</p>
  </header>
  <div class="home-main">
    <div class="grid" id="grid"></div>
  </div>
  <div class="loading" id="homeLoading">Загрузка PDF…</div>
</div>

<div class="screen" id="viewerScreen">
  <div class="viewer-topbar">
    <button class="back-btn" id="backBtn" type="button">← Назад</button>
    <span class="page-info" id="pageInfo">—</span>
  </div>
  <div class="viewer-wrap" id="viewerWrap">
    <div class="loading" id="viewerLoading">Открываем страницу…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const TICKET_PAGES = [1,4,7,10,14,19,24,27,31,33,39,43,45,48,50,54,59,62,65,70,75,80,85,91,95,99,104,107,111,116];
const PDF_URL = "tickets.pdf";
const INITIAL_FORWARD_PAGES = 7;
const HIGHLIGHT_RETRY_MS = 80;
const HIGHLIGHT_MAX_ATTEMPTS = 12;

let pdfDoc = null;
let pdfReady = false;
let currentPage = 1;
let currentTicket = null;
let viewerStartPage = 1;
let viewerEndPage = 1;
let renderToken = 0;
let pagesStrip = null;
let renderedPages = new Map();
let scrollRaf = null;
let lastViewerWidth = 0;
let resizeTimer = null;
const shellMeta = new WeakMap();

const homeScreen = document.getElementById("homeScreen");
const viewerScreen = document.getElementById("viewerScreen");
const grid = document.getElementById("grid");
const viewerWrap = document.getElementById("viewerWrap");
const pageInfo = document.getElementById("pageInfo");
const backBtn = document.getElementById("backBtn");
const homeLoading = document.getElementById("homeLoading");

TICKET_PAGES.forEach((page, idx) => {
  const num = idx + 1;
  const btn = document.createElement("button");
  btn.className = "ticket-btn";
  btn.textContent = num;
  btn.dataset.num = num;
  btn.addEventListener("click", () => goToTicket(num));
  grid.appendChild(btn);
});

function showScreen(name){
  homeScreen.classList.toggle("active", name === "home");
  viewerScreen.classList.toggle("active", name === "viewer");
}

function setActiveButton(num){
  document.querySelectorAll(".ticket-btn").forEach(b => {
    b.classList.toggle("active", num != null && Number(b.dataset.num) === num);
  });
}

async function init(){
  try{
    pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
    pdfReady = true;
    homeLoading.remove();
  }catch(err){
    homeLoading.textContent = "Не удалось загрузить PDF: " + err.message;
  }
}

function ticketForPage(pageNum){
  const idx = TICKET_PAGES.indexOf(pageNum);
  return idx >= 0 ? idx + 1 : null;
}

function goToTicket(num){
  if(!pdfReady){
    homeLoading.textContent = "PDF ещё загружается, подождите…";
    return;
  }
  const page = TICKET_PAGES[num - 1];
  currentTicket = num;
  setActiveButton(num);
  showScreen("viewer");
  openViewerAt(page, num, null, { highlight: true });
}

function goHome(){
  resetViewerStrip();
  currentTicket = null;
  setActiveButton(null);
  showScreen("home");
}

function normalizeHeadingText(text){
  return (text || "").replace(/[\u00a0\s]+/g, " ").trim();
}

function ticketHeadingPattern(ticketNum){
  const num = String(ticketNum).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return new RegExp(
    "билет[\\s\\u00a0]*(?:№|#|n[º°o]\\.?)[\\s\\u00a0]*" + num + "(?!\\d)",
    "i"
  );
}

function isHeadingStartText(text){
  const t = normalizeHeadingText(text);
  if(!t) return false;
  return /^билет/i.test(t) || /^[№#nº°o]/i.test(t);
}

function findAllHeadingItemGroups(items, ticketNum){
  if(!items || !items.length) return [];
  const pattern = ticketHeadingPattern(ticketNum);
  const chunks = [];

  items.forEach((item, idx) => {
    if(item && item.str) chunks.push({ idx, str: item.str });
  });

  const matches = [];
  for(let i = 0; i < chunks.length; i++){
    if(!isHeadingStartText(chunks[i].str)) continue;

    let combined = "";
    const group = [];
    for(let j = i; j < Math.min(i + 20, chunks.length); j++){
      combined += chunks[j].str;
      group.push(chunks[j].idx);
      const normalized = normalizeHeadingText(combined);
      if(pattern.test(normalized) && /^билет/i.test(normalized)){
        matches.push(group.slice());
        break;
      }
    }
  }
  return matches;
}

function findHeadingItemIndices(items, ticketNum, viewport){
  const groups = findAllHeadingItemGroups(items, ticketNum);
  if(!groups.length) return null;
  return pickBestHeadingGroup(groups, items, viewport);
}

function itemBox(item, viewport){
  const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
  const fontHeight = Math.hypot(tx[2], tx[3]) || Math.hypot(tx[0], tx[1]) || 12;
  const scaleX = Math.hypot(tx[0], tx[1]) || 1;
  const left = tx[4];
  const top = tx[5] - fontHeight;
  const width = item.width
    ? Math.abs(item.width * scaleX)
    : fontHeight * 0.55 * (item.str ? item.str.trim().length : 1);
  return { left, top, width, height: fontHeight, centerY: top + fontHeight / 2 };
}

function filterIndicesSameLine(indices, items, viewport, tolerance){
  if(!indices || indices.length <= 1) return indices || [];
  tolerance = tolerance != null ? tolerance : Math.max(6, (itemBox(items[indices[0]], viewport).height || 12) * 0.45);
  const firstBox = itemBox(items[indices[0]], viewport);
  const baseY = firstBox.centerY;
  return indices.filter(idx => {
    const item = items[idx];
    if(!item || !item.str || !item.str.trim()) return false;
    const box = itemBox(item, viewport);
    return Math.abs(box.centerY - baseY) <= tolerance;
  });
}

function filterSpansSameLine(spans, tolerance){
  if(!spans || spans.length <= 1) return spans || [];
  const firstRect = spans[0].getBoundingClientRect();
  tolerance = tolerance != null ? tolerance : Math.max(6, firstRect.height * 0.45);
  const baseY = firstRect.top + firstRect.height / 2;
  return spans.filter(span => {
    const text = (span.textContent || "").trim();
    if(!text) return false;
    const rect = span.getBoundingClientRect();
    if(rect.width < 0.5 && rect.height < 0.5) return false;
    const centerY = rect.top + rect.height / 2;
    return Math.abs(centerY - baseY) <= tolerance;
  });
}

function boxFromItems(items, indices, viewport){
  indices = filterIndicesSameLine(indices, items, viewport);
  if(!indices.length) return null;

  let minL = Infinity;
  let minT = Infinity;
  let maxR = -Infinity;
  let maxB = -Infinity;

  for(const idx of indices){
    const item = items[idx];
    if(!item || !item.str || !item.str.trim()) continue;
    const box = itemBox(item, viewport);
    minL = Math.min(minL, box.left);
    minT = Math.min(minT, box.top);
    maxR = Math.max(maxR, box.left + box.width);
    maxB = Math.max(maxB, box.top + box.height);
  }

  if(minL === Infinity) return null;
  return {
    left: minL - 6,
    top: minT - 3,
    width: maxR - minL + 12,
    height: maxB - minT + 6
  };
}

function boxFromSpans(targetSpans, shell){
  targetSpans = filterSpansSameLine(targetSpans);
  if(!targetSpans.length) return null;

  const shellRect = shell.getBoundingClientRect();
  let minL = Infinity;
  let minT = Infinity;
  let maxR = -Infinity;
  let maxB = -Infinity;

  targetSpans.forEach(span => {
    const rect = span.getBoundingClientRect();
    if(rect.width < 0.5 && rect.height < 0.5) return;
    minL = Math.min(minL, rect.left - shellRect.left);
    minT = Math.min(minT, rect.top - shellRect.top);
    maxR = Math.max(maxR, rect.right - shellRect.left);
    maxB = Math.max(maxB, rect.bottom - shellRect.top);
  });

  if(minL === Infinity) return null;
  return {
    left: minL - 6,
    top: minT - 3,
    width: maxR - minL + 12,
    height: maxB - minT + 6
  };
}

function pickBestHeadingGroup(groups, items, viewport){
  let bestGroup = null;
  let bestLeft = Infinity;
  let bestTop = Infinity;

  for(const group of groups){
    let left;
    let top;
    if(viewport){
      const box = boxFromItems(items, group, viewport);
      if(!box) continue;
      left = box.left;
      top = box.top;
    }else{
      const first = items[group[0]];
      if(!first || !first.transform) continue;
      left = first.transform[4];
      top = first.transform[5];
    }
    if(left < bestLeft || (left === bestLeft && top < bestTop)){
      bestLeft = left;
      bestTop = top;
      bestGroup = group;
    }
  }
  return bestGroup;
}

function findAllHeadingSpanGroups(spans, ticketNum){
  if(!spans.length) return [];
  const pattern = ticketHeadingPattern(ticketNum);
  const matches = [];

  for(let i = 0; i < spans.length; i++){
    if(!isHeadingStartText(spans[i].textContent)) continue;

    let combined = "";
    const group = [];
    for(let j = i; j < Math.min(i + 20, spans.length); j++){
      combined += spans[j].textContent || "";
      group.push(spans[j]);
      const normalized = normalizeHeadingText(combined);
      if(pattern.test(normalized) && /^билет/i.test(normalized)){
        matches.push(group.slice());
        break;
      }
    }
  }
  return matches;
}

function findHeadingBoxFromSpans(textLayer, shell, ticketNum){
  const spans = Array.from(textLayer.querySelectorAll("span"));
  if(!spans.length) return null;

  const groups = findAllHeadingSpanGroups(spans, ticketNum);
  if(!groups.length) return null;

  let bestBox = null;
  let bestLeft = Infinity;
  let bestTop = Infinity;

  for(const group of groups){
    const box = boxFromSpans(group, shell);
    if(!box) continue;
    if(box.left < bestLeft || (box.left === bestLeft && box.top < bestTop)){
      bestLeft = box.left;
      bestTop = box.top;
      bestBox = box;
    }
  }

  return bestBox;
}

function findHeadingBox(shell, ticketNum){
  const textLayer = shell.querySelector(".textLayer");
  if(textLayer){
    const spanBox = findHeadingBoxFromSpans(textLayer, shell, ticketNum);
    if(spanBox) return spanBox;
  }

  const meta = shellMeta.get(shell);
  if(meta){
    const indices = findHeadingItemIndices(meta.textContent.items, ticketNum, meta.viewport);
    if(indices){
      const box = boxFromItems(meta.textContent.items, indices, meta.viewport);
      if(box) return box;
    }
  }

  return null;
}

function flashHeadingBox(shell, box){
  shell.querySelectorAll(".heading-highlight-flash").forEach(el => el.remove());

  const overlay = document.createElement("div");
  overlay.className = "heading-highlight-flash";
  overlay.style.left = box.left + "px";
  overlay.style.top = box.top + "px";
  overlay.style.width = Math.max(box.width, 8) + "px";
  overlay.style.height = Math.max(box.height, 8) + "px";
  shell.appendChild(overlay);

  overlay.addEventListener("animationend", () => overlay.remove(), { once: true });
  return overlay;
}

function resetHorizontalScroll(){
  viewerWrap.scrollLeft = 0;
}

function highlightTicketHeading(shell, ticketNum){
  if(!shell || !ticketNum) return false;

  const box = findHeadingBox(shell, ticketNum);
  if(!box) return false;

  flashHeadingBox(shell, box);
  resetHorizontalScroll();
  return true;
}

function wait(ms){
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function highlightTicketHeadingWithRetry(pageNum, ticketNum, myToken){
  for(let attempt = 0; attempt < HIGHLIGHT_MAX_ATTEMPTS; attempt++){
    if(renderToken !== myToken) return;

    const shell = renderedPages.get(pageNum);
    if(shell && shell.querySelector("canvas") && highlightTicketHeading(shell, ticketNum)) return;

    await wait(HIGHLIGHT_RETRY_MS);
  }
}

function resetViewerStrip(){
  renderToken++;
  renderedPages = new Map();
  pagesStrip = null;
  viewerWrap.innerHTML = "";
}

function getContainerWidth(){
  return Math.min(viewerWrap.clientWidth - 32, 760);
}

function pageViewport(page){
  const containerWidth = getContainerWidth();
  const baseViewport = page.getViewport({ scale: 1 });
  const scale = containerWidth / baseViewport.width;
  return page.getViewport({ scale });
}

async function renderPageShell(pageNum, myToken, page){
  if(!page){
    page = await pdfDoc.getPage(pageNum);
    if(myToken !== renderToken) return null;
  }

  const viewport = pageViewport(page);
  const outputScale = window.devicePixelRatio || 1;

  const shell = document.createElement("div");
  shell.className = "page-shell";
  shell.dataset.page = String(pageNum);
  shell.style.width = viewport.width + "px";
  shell.style.height = viewport.height + "px";

  const canvas = document.createElement("canvas");
  canvas.width = Math.floor(viewport.width * outputScale);
  canvas.height = Math.floor(viewport.height * outputScale);
  canvas.style.width = viewport.width + "px";
  canvas.style.height = viewport.height + "px";
  const ctx = canvas.getContext("2d");
  const transform = outputScale !== 1 ? [outputScale,0,0,outputScale,0,0] : null;

  shell.appendChild(canvas);

  await page.render({ canvasContext: ctx, viewport, transform }).promise;
  if(myToken !== renderToken) return null;

  const textLayerDiv = document.createElement("div");
  textLayerDiv.className = "textLayer";
  textLayerDiv.style.width = viewport.width + "px";
  textLayerDiv.style.height = viewport.height + "px";
  shell.appendChild(textLayerDiv);

  const textContent = await page.getTextContent();
  if(myToken !== renderToken) return null;

  await pdfjsLib.renderTextLayer({
    textContentSource: textContent,
    container: textLayerDiv,
    viewport
  }).promise;
  if(myToken !== renderToken) return null;

  shellMeta.set(shell, { textContent, viewport });
  return { shell, textLayerDiv };
}

function insertPageShell(pageNum, shell){
  const nextPage = renderedPages.get(pageNum + 1);
  if(nextPage){
    pagesStrip.insertBefore(shell, nextPage);
  }else{
    pagesStrip.appendChild(shell);
  }
  renderedPages.set(pageNum, shell);
}

async function ensurePageRendered(pageNum, myToken){
  pageNum = Math.min(Math.max(viewerStartPage, pageNum), viewerEndPage);
  if(renderedPages.has(pageNum)) return renderedPages.get(pageNum);

  const page = await pdfDoc.getPage(pageNum);
  if(myToken !== renderToken) return null;
  const viewport = pageViewport(page);

  const placeholder = document.createElement("div");
  placeholder.className = "page-shell";
  placeholder.dataset.page = String(pageNum);
  placeholder.style.width = viewport.width + "px";
  placeholder.style.height = viewport.height + "px";
  placeholder.style.minHeight = viewport.height + "px";
  placeholder.style.display = "flex";
  placeholder.style.alignItems = "center";
  placeholder.style.justifyContent = "center";
  placeholder.style.color = "#666";
  placeholder.style.fontSize = "14px";
  placeholder.textContent = "Стр. " + pageNum + "…";
  insertPageShell(pageNum, placeholder);

  const result = await renderPageShell(pageNum, myToken, page);
  if(myToken !== renderToken || !result) return null;

  const { shell } = result;
  if(renderedPages.get(pageNum) === placeholder){
    pagesStrip.replaceChild(shell, placeholder);
    renderedPages.set(pageNum, shell);
  }
  return shell;
}

async function loadForwardPages(throughPage, myToken){
  const end = Math.min(viewerEndPage, throughPage);
  for(let p = viewerStartPage; p <= end; p++){
    await ensurePageRendered(p, myToken);
    if(myToken !== renderToken) return;
  }
}

async function scrollToPage(pageNum){
  if(!pagesStrip || !pdfDoc) return;
  const myToken = renderToken;
  pageNum = Math.min(Math.max(viewerStartPage, pageNum), viewerEndPage);
  await ensurePageRendered(pageNum, myToken);
  if(myToken !== renderToken) return;
  const shell = renderedPages.get(pageNum);
  if(shell){
    resetHorizontalScroll();
    shell.scrollIntoView({ behavior: "auto", block: "start", inline: "nearest" });
    resetHorizontalScroll();
  }
}

function getVisiblePage(){
  const shells = pagesStrip ? Array.from(pagesStrip.querySelectorAll(".page-shell[data-page]")) : [];
  if(!shells.length) return currentPage;

  const wrapTop = viewerWrap.getBoundingClientRect().top;
  const wrapCenter = wrapTop + viewerWrap.clientHeight * 0.35;
  let bestPage = currentPage;
  let bestDist = Infinity;

  for(const shell of shells){
    const rect = shell.getBoundingClientRect();
    const center = rect.top + rect.height / 2;
    const dist = Math.abs(center - wrapCenter);
    if(dist < bestDist){
      bestDist = dist;
      bestPage = Number(shell.dataset.page);
    }
  }
  return bestPage;
}

function onViewerScroll(){
  if(scrollRaf) return;
  scrollRaf = requestAnimationFrame(() => {
    scrollRaf = null;
    if(!pdfDoc || !pagesStrip) return;

    const visible = getVisiblePage();
    const clamped = Math.min(Math.max(visible, viewerStartPage), viewerEndPage);
    if(clamped !== currentPage){
      currentPage = clamped;
      const ticket = ticketForPage(currentPage);
      if(ticket) currentTicket = ticket;
      updatePageInfo();
    }
  });
}

async function openViewerAt(pageNum, ticketNum, fixedStartPage, options){
  if(!pdfDoc) return;
  const highlight = options && options.highlight;

  resetViewerStrip();
  const myToken = renderToken;

  pageNum = Math.min(Math.max(1, pageNum), pdfDoc.numPages);
  viewerStartPage = fixedStartPage != null ? fixedStartPage : pageNum;
  viewerEndPage = Math.min(pdfDoc.numPages, viewerStartPage + INITIAL_FORWARD_PAGES);
  currentPage = pageNum;
  currentTicket = ticketNum ?? ticketForPage(pageNum) ?? currentTicket;
  lastViewerWidth = viewerWrap.clientWidth;

  pagesStrip = document.createElement("div");
  pagesStrip.className = "pages-strip";
  viewerWrap.innerHTML = "";
  viewerWrap.appendChild(pagesStrip);

  const throughPage = viewerEndPage;
  await loadForwardPages(throughPage, myToken);
  if(myToken !== renderToken) return;

  updatePageInfo();
  resetHorizontalScroll();
  requestAnimationFrame(() => {
    scrollToPage(pageNum).then(() => {
      resetHorizontalScroll();
      if(highlight && ticketNum && renderToken === myToken){
        highlightTicketHeadingWithRetry(pageNum, ticketNum, myToken);
      }
    });
  });
}

function updatePageInfo(){
  let label = "Стр. " + currentPage + " из " + pdfDoc.numPages;
  if(viewerEndPage < pdfDoc.numPages){
    label += " (до " + viewerEndPage + ")";
  }
  if(currentTicket) label = "Билет " + currentTicket + " · " + label;
  pageInfo.textContent = label;
}

backBtn.addEventListener("click", goHome);
viewerWrap.addEventListener("scroll", onViewerScroll, { passive: true });

window.addEventListener("keydown", (e) => {
  if(!pdfDoc || !viewerScreen.classList.contains("active")) return;
  if(e.key === "ArrowDown" || e.key === "ArrowRight" || e.key === "PageDown"){
    if(currentPage < viewerEndPage){
      e.preventDefault();
      scrollToPage(currentPage + 1);
    }
  }else if(e.key === "ArrowUp" || e.key === "ArrowLeft" || e.key === "PageUp"){
    if(currentPage > viewerStartPage){
      e.preventDefault();
      scrollToPage(currentPage - 1);
    }
  }
});

window.addEventListener("resize", () => {
  if(!viewerScreen.classList.contains("active") || !pdfDoc) return;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    const w = viewerWrap.clientWidth;
    if(Math.abs(w - lastViewerWidth) < 2) return;
    lastViewerWidth = w;
    openViewerAt(currentPage, currentTicket, viewerStartPage);
  }, 250);
});

init();
</script>
