<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Шпаргалка — Билеты</title>
<style>
  :root{
    --bg:#1c1d21;
    --panel:#26282e;
    --accent:#ffcc4d;
    --text:#eceef1;
    --text-dim:#9a9da5;
    --btn:#33353c;
    --btn-active:#ffcc4d;
    --btn-active-text:#1c1d21;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  .screen{display:none; min-height:100vh; min-height:100dvh;}
  .screen.active{display:flex; flex-direction:column;}
  #homeScreen.active{
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .home-header{
    flex-shrink:0;
    padding:clamp(10px,2.5vw,18px) clamp(16px,4vw,32px) clamp(6px,1.5vw,10px);
    padding-top:max(clamp(10px,2.5vw,18px), env(safe-area-inset-top));
    text-align:center;
  }
  .home-header h1{
    margin:0;
    font-size:clamp(17px,4vw,22px);
    font-weight:600;
  }
  .home-header p{
    margin:4px 0 0;
    font-size:clamp(12px,2.8vw,14px);
    color:var(--text-dim);
  }
  .home-main{
    flex:1;
    min-height:0;
    display:flex;
    width:100%;
    padding:0 clamp(10px,3vw,28px) max(clamp(10px,3vw,28px), env(safe-area-inset-bottom));
  }
  .grid{
    flex:1;
    width:100%;
    min-height:0;
    display:grid;
    grid-template-columns:repeat(3, minmax(0, 1fr));
    grid-auto-rows:1fr;
    gap:clamp(8px,2vmin,18px);
    align-content:stretch;
  }
  @media (min-width:520px){
    .grid{grid-template-columns:repeat(5, minmax(0, 1fr));}
  }
  @media (min-width:768px){
    .grid{grid-template-columns:repeat(6, minmax(0, 1fr));}
  }
  @media (min-width:1100px){
    .home-main{
      max-width:1400px;
      margin:0 auto;
    }
    .grid{grid-template-columns:repeat(10, minmax(0, 1fr));}
  }
  .ticket-btn{
    background:var(--btn);
    color:var(--text);
    border:none;
    border-radius:clamp(10px,2.5vmin,16px);
    width:100%;
    height:100%;
    min-height:clamp(52px,12vmin,110px);
    padding:0;
    font-size:clamp(18px,4.8vmin,28px);
    font-weight:700;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 0 rgba(0,0,0,.22);
    -webkit-tap-highlight-color:transparent;
    touch-action:manipulation;
    user-select:none;
    transition:background .15s ease, color .15s ease, transform .1s ease, filter .15s ease;
  }
  @media (hover:hover){
    .ticket-btn:hover{filter:brightness(1.1);}
  }
  .ticket-btn:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  .ticket-btn:active{transform:scale(0.96);}
  .ticket-btn.active{
    background:var(--btn-active);
    color:var(--btn-active-text);
    box-shadow:0 2px 0 rgba(0,0,0,.15);
  }
  .viewer-topbar{
    display:flex;
    align-items:center;
    gap:12px;
    padding:10px 12px 6px;
    position:sticky;
    top:0;
    z-index:10;
    background:var(--bg);
  }
  .back-btn{
    background:var(--panel);
    color:var(--text);
    border:none;
    border-radius:8px;
    padding:8px 12px;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .back-btn:active{opacity:.8;}
  .page-info{
    flex:1;
    font-size:13px;
    color:var(--text-dim);
    text-align:center;
    min-width:0;
  }
  .viewer-wrap{
    flex:1;
    overflow-y:auto;
    overflow-x:hidden;
    -webkit-overflow-scrolling:touch;
    padding:6px 0 24px;
  }
  .pages-strip{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:clamp(10px,2.5vw,18px);
    width:100%;
    padding:0 clamp(8px,2vw,16px);
  }
  .page-shell{
    position:relative;
    background:#fff;
    box-shadow:0 4px 24px rgba(0,0,0,.4);
    flex-shrink:0;
    line-height:0;
    scroll-margin-top:8px;
  }
  .page-shell canvas{display:block;}
  .textLayer{
    position:absolute;
    top:0; left:0;
    overflow:hidden;
    line-height:1;
  }
  .textLayer span{
    color:transparent;
    position:absolute;
    white-space:pre;
    cursor:text;
    transform-origin:0% 0%;
  }
  .loading{
    color:var(--text-dim);
    text-align:center;
    padding:40px 16px;
    font-size:14px;
  }
  #homeLoading{
    position:absolute;
    left:0;
    right:0;
    bottom:max(20px, env(safe-area-inset-bottom));
    padding:0 16px;
  }
  #homeScreen{position:relative;}
</style>
</head>
<body>

<div class="screen active" id="homeScreen">
  <header class="home-header">
    <h1>Шпаргалка — Билеты</h1>
    <p>Нажми на номер билета — откроется нужная страница</p>
  </header>
  <div class="home-main">
    <div class="grid" id="grid"></div>
  </div>
  <div class="loading" id="homeLoading">Загрузка PDF…</div>
</div>

<div class="screen" id="viewerScreen">
  <div class="viewer-topbar">
    <button class="back-btn" id="backBtn" type="button">← Назад</button>
    <span class="page-info" id="pageInfo">—</span>
  </div>
  <div class="viewer-wrap" id="viewerWrap">
    <div class="loading" id="viewerLoading">Открываем страницу…</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

const TICKET_PAGES = [1,4,7,10,14,19,24,27,31,33,39,43,45,48,50,54,59,62,65,70,75,80,85,91,95,99,104,107,111,116];
const PDF_URL = "tickets.pdf";
const HIGHLIGHT_MS = 3000;
const HIGHLIGHT_FADE_MS = 800;
const INITIAL_FORWARD_PAGES = 7;

let pdfDoc = null;
let pdfReady = false;
let currentPage = 1;
let currentTicket = null;
let viewerStartPage = 1;
let renderToken = 0;
let highlightTimer = null;
let pagesStrip = null;
let renderedPages = new Map();
let scrollRaf = null;
let stripLoading = false;

const homeScreen = document.getElementById("homeScreen");
const viewerScreen = document.getElementById("viewerScreen");
const grid = document.getElementById("grid");
const viewerWrap = document.getElementById("viewerWrap");
const pageInfo = document.getElementById("pageInfo");
const backBtn = document.getElementById("backBtn");
const homeLoading = document.getElementById("homeLoading");

TICKET_PAGES.forEach((page, idx) => {
  const num = idx + 1;
  const btn = document.createElement("button");
  btn.className = "ticket-btn";
  btn.textContent = num;
  btn.dataset.num = num;
  btn.addEventListener("click", () => goToTicket(num));
  grid.appendChild(btn);
});

function showScreen(name){
  homeScreen.classList.toggle("active", name === "home");
  viewerScreen.classList.toggle("active", name === "viewer");
}

function setActiveButton(num){
  document.querySelectorAll(".ticket-btn").forEach(b => {
    b.classList.toggle("active", num != null && Number(b.dataset.num) === num);
  });
}

async function init(){
  try{
    pdfDoc = await pdfjsLib.getDocument(PDF_URL).promise;
    pdfReady = true;
    homeLoading.remove();
  }catch(err){
    homeLoading.textContent = "Не удалось загрузить PDF: " + err.message;
  }
}

function ticketForPage(pageNum){
  const idx = TICKET_PAGES.indexOf(pageNum);
  return idx >= 0 ? idx + 1 : null;
}

function goToTicket(num){
  if(!pdfReady){
    homeLoading.textContent = "PDF ещё загружается, подождите…";
    return;
  }
  const page = TICKET_PAGES[num - 1];
  currentTicket = num;
  setActiveButton(num);
  showScreen("viewer");
  openViewerAt(page, num);
}

function goHome(){
  resetViewerStrip();
  currentTicket = null;
  setActiveButton(null);
  showScreen("home");
}

function goToTicketHeading(ticketNum, textLayerDiv, shell){
  const spans = Array.from(textLayerDiv.querySelectorAll("span"));
  const pattern = new RegExp("БИЛЕТ\\s*№\\s*" + ticketNum + "\\b", "i");
  let targets = [];

  for(const span of spans){
    if(pattern.test((span.textContent || "").replace(/\s+/g, " "))){
      targets = [span];
      break;
    }
  }

  if(!targets.length){
    for(let i = 0; i < spans.length; i++){
      let combined = "";
      const group = [];
      for(let j = i; j < Math.min(i + 10, spans.length); j++){
        combined += spans[j].textContent || "";
        group.push(spans[j]);
        if(pattern.test(combined.replace(/\s+/g, " "))){
          targets = group;
          break;
        }
      }
      if(targets.length) break;
    }
  }

  if(!targets.length){
    for(const span of spans){
      const t = span.textContent || "";
      if(/БИЛЕТ/i.test(t) && /№/.test(t)){
        targets = [span];
        break;
      }
    }
  }

  if(!targets.length) return;

  targets.forEach(target => {
    target.style.transition = "none";
    target.style.backgroundColor = "rgba(255,204,77,0.9)";
    target.style.borderRadius = "3px";
    target.style.boxShadow = "0 0 0 3px rgba(255,204,77,0.75)";
  });

  requestAnimationFrame(() => {
    targets[0].scrollIntoView({ behavior: "smooth", block: "center" });
    highlightTimer = setTimeout(() => {
      targets.forEach(target => {
        target.style.transition = "background-color " + HIGHLIGHT_FADE_MS + "ms ease, box-shadow " + HIGHLIGHT_FADE_MS + "ms ease";
        target.style.backgroundColor = "transparent";
        target.style.boxShadow = "0 0 0 0 rgba(255,204,77,0)";
      });
      highlightTimer = null;
    }, HIGHLIGHT_MS);
  });
}

function resetViewerStrip(){
  renderToken++;
  renderedPages = new Map();
  pagesStrip = null;
  viewerWrap.innerHTML = "";
  if(highlightTimer){
    clearTimeout(highlightTimer);
    highlightTimer = null;
  }
}

function getContainerWidth(){
  return Math.min(viewerWrap.clientWidth - 32, 760);
}

async function renderPageShell(pageNum, myToken){
  const page = await pdfDoc.getPage(pageNum);
  if(myToken !== renderToken) return null;

  const containerWidth = getContainerWidth();
  const baseViewport = page.getViewport({ scale: 1 });
  const outputScale = window.devicePixelRatio || 1;
  const scale = containerWidth / baseViewport.width;
  const viewport = page.getViewport({ scale });

  const shell = document.createElement("div");
  shell.className = "page-shell";
  shell.dataset.page = String(pageNum);
  shell.style.width = viewport.width + "px";
  shell.style.height = viewport.height + "px";

  const canvas = document.createElement("canvas");
  canvas.width = Math.floor(viewport.width * outputScale);
  canvas.height = Math.floor(viewport.height * outputScale);
  canvas.style.width = viewport.width + "px";
  canvas.style.height = viewport.height + "px";
  const ctx = canvas.getContext("2d");
  const transform = outputScale !== 1 ? [outputScale,0,0,outputScale,0,0] : null;

  shell.appendChild(canvas);

  await page.render({ canvasContext: ctx, viewport, transform }).promise;
  if(myToken !== renderToken) return null;

  const textLayerDiv = document.createElement("div");
  textLayerDiv.className = "textLayer";
  textLayerDiv.style.width = viewport.width + "px";
  textLayerDiv.style.height = viewport.height + "px";
  shell.appendChild(textLayerDiv);

  const textContent = await page.getTextContent();
  if(myToken !== renderToken) return null;

  await pdfjsLib.renderTextLayer({
    textContentSource: textContent,
    container: textLayerDiv,
    viewport
  }).promise;
  if(myToken !== renderToken) return null;

  return { shell, textLayerDiv };
}

function insertPageShell(pageNum, shell){
  const nextPage = renderedPages.get(pageNum + 1);
  if(nextPage){
    pagesStrip.insertBefore(shell, nextPage);
  }else{
    pagesStrip.appendChild(shell);
  }
  renderedPages.set(pageNum, shell);
}

async function ensurePageRendered(pageNum, myToken){
  pageNum = Math.min(Math.max(1, pageNum), pdfDoc.numPages);
  if(renderedPages.has(pageNum)) return renderedPages.get(pageNum);

  const placeholder = document.createElement("div");
  placeholder.className = "page-shell";
  placeholder.dataset.page = String(pageNum);
  placeholder.style.width = getContainerWidth() + "px";
  placeholder.style.minHeight = "120px";
  placeholder.style.display = "flex";
  placeholder.style.alignItems = "center";
  placeholder.style.justifyContent = "center";
  placeholder.style.color = "#666";
  placeholder.style.fontSize = "14px";
  placeholder.textContent = "Стр. " + pageNum + "…";
  insertPageShell(pageNum, placeholder);

  const result = await renderPageShell(pageNum, myToken);
  if(myToken !== renderToken || !result) return null;

  const { shell } = result;
  if(renderedPages.get(pageNum) === placeholder){
    pagesStrip.replaceChild(shell, placeholder);
    renderedPages.set(pageNum, shell);
  }
  return shell;
}

async function loadForwardPages(throughPage, myToken){
  const end = Math.min(pdfDoc.numPages, throughPage);
  for(let p = viewerStartPage; p <= end; p++){
    await ensurePageRendered(p, myToken);
    if(myToken !== renderToken) return;
  }
}

async function scrollToPage(pageNum){
  if(!pagesStrip || !pdfDoc) return;
  const myToken = renderToken;
  pageNum = Math.min(Math.max(viewerStartPage, pageNum), pdfDoc.numPages);
  await ensurePageRendered(pageNum, myToken);
  if(myToken !== renderToken) return;
  const shell = renderedPages.get(pageNum);
  if(shell) shell.scrollIntoView({ behavior: "auto", block: "start" });
}

function getVisiblePage(){
  const shells = pagesStrip ? Array.from(pagesStrip.querySelectorAll(".page-shell[data-page]")) : [];
  if(!shells.length) return currentPage;

  const wrapTop = viewerWrap.getBoundingClientRect().top;
  const wrapCenter = wrapTop + viewerWrap.clientHeight * 0.35;
  let bestPage = currentPage;
  let bestDist = Infinity;

  for(const shell of shells){
    const rect = shell.getBoundingClientRect();
    const center = rect.top + rect.height / 2;
    const dist = Math.abs(center - wrapCenter);
    if(dist < bestDist){
      bestDist = dist;
      bestPage = Number(shell.dataset.page);
    }
  }
  return bestPage;
}

async function expandStripIfNeeded(){
  if(!pdfDoc || !pagesStrip || stripLoading) return;
  const myToken = renderToken;
  const wrapRect = viewerWrap.getBoundingClientRect();
  let needLoad = false;

  for(const shell of pagesStrip.querySelectorAll(".page-shell[data-page]")){
    const pageNum = Number(shell.dataset.page);
    const rect = shell.getBoundingClientRect();
    if(rect.bottom > wrapRect.top - 400 && rect.top < wrapRect.bottom + 400){
      if(pageNum < pdfDoc.numPages && !renderedPages.has(pageNum + 1)) needLoad = true;
    }
  }

  if(!needLoad) return;
  stripLoading = true;

  const maxRendered = Math.max(...renderedPages.keys());
  const loadEnd = Math.min(pdfDoc.numPages, maxRendered + 2);
  for(let p = maxRendered + 1; p <= loadEnd; p++){
    await ensurePageRendered(p, myToken);
    if(myToken !== renderToken) break;
  }

  stripLoading = false;
}

function onViewerScroll(){
  if(scrollRaf) return;
  scrollRaf = requestAnimationFrame(async () => {
    scrollRaf = null;
    if(!pdfDoc || !pagesStrip) return;

    const visible = getVisiblePage();
    if(visible !== currentPage){
      currentPage = visible;
      const ticket = ticketForPage(currentPage);
      if(ticket) currentTicket = ticket;
      updatePageInfo();
    }
    await expandStripIfNeeded();
  });
}

async function openViewerAt(pageNum, ticketNum, fixedStartPage){
  if(!pdfDoc) return;

  resetViewerStrip();
  const myToken = renderToken;

  pageNum = Math.min(Math.max(1, pageNum), pdfDoc.numPages);
  viewerStartPage = fixedStartPage != null ? fixedStartPage : pageNum;
  currentPage = pageNum;
  currentTicket = ticketNum ?? ticketForPage(pageNum) ?? currentTicket;

  pagesStrip = document.createElement("div");
  pagesStrip.className = "pages-strip";
  viewerWrap.innerHTML = "";
  viewerWrap.appendChild(pagesStrip);

  const throughPage = Math.min(
    pdfDoc.numPages,
    Math.max(viewerStartPage + INITIAL_FORWARD_PAGES, pageNum)
  );
  await loadForwardPages(throughPage, myToken);
  if(myToken !== renderToken) return;

  updatePageInfo();
  requestAnimationFrame(() => {
    scrollToPage(pageNum).then(() => {
      if(ticketNum && renderToken === myToken){
        const shell = renderedPages.get(pageNum);
        const textLayer = shell && shell.querySelector(".textLayer");
        if(textLayer) goToTicketHeading(ticketNum, textLayer, shell);
      }
    });
  });
}

function updatePageInfo(){
  let label = "Стр. " + currentPage + " из " + pdfDoc.numPages;
  if(currentTicket) label = "Билет " + currentTicket + " · " + label;
  pageInfo.textContent = label;
}

backBtn.addEventListener("click", goHome);
viewerWrap.addEventListener("scroll", onViewerScroll, { passive: true });

window.addEventListener("keydown", (e) => {
  if(!pdfDoc || !viewerScreen.classList.contains("active")) return;
  if(e.key === "ArrowDown" || e.key === "ArrowRight" || e.key === "PageDown"){
    if(currentPage < pdfDoc.numPages){
      e.preventDefault();
      scrollToPage(currentPage + 1);
    }
  }else if(e.key === "ArrowUp" || e.key === "ArrowLeft" || e.key === "PageUp"){
    if(currentPage > viewerStartPage){
      e.preventDefault();
      scrollToPage(currentPage - 1);
    }
  }
});

window.addEventListener("resize", () => {
  if(viewerScreen.classList.contains("active") && pdfDoc){
    openViewerAt(currentPage, currentTicket, viewerStartPage);
  }
});

init();
</script>
</body>
</html>
